# GraphRAG Platform — Alembic configuration
# Database URL is set programmatically from app.core.config in env.py

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s
path_separator = os

sqlalchemy.url = postgresql://user:pass@localhost:5432/graphrag

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S