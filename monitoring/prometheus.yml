global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "graphrag-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: graphrag-backend

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "dcgm-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["dcgm-exporter:9400"]
        labels:
          service: nvidia-gpu